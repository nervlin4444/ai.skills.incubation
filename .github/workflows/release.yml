name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release             @semantic-release/changelog             @semantic-release/git             @semantic-release/commit-analyzer             @semantic-release/release-notes-generator             @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # =====================================================================
      # FIX v1.0.8: Post-process CHANGELOG.md to add frontmatter
      # DYNAMIC: Iterates all skill subdirectories, NEVER hardcodes skill names.
      # name = directory name, github_path = "{skill_name}/CHANGELOG.md"
      # CHANGELOG.md is auto-generated by semantic-release at repo root.
      # This step copies it to each skill subdir and injects frontmatter.
      # Uses [skip ci] to prevent loop. Uses docs: type (no version bump).
      # =====================================================================
      - name: Add frontmatter to CHANGELOG.md files
        if: success()
        run: |
          changed=0

          # Iterate all subdirectories (exclude hidden dirs)
          for dir in $(ls -d */ 2>/dev/null | grep -v '^\.'); do
            # Only process directories containing SKILL.md (skill directory)
            if [ ! -f "${dir}SKILL.md" ]; then
              continue
            fi

            skill_name=$(basename "$dir")
            changelog_path="${dir}CHANGELOG.md"

            # If skill dir lacks CHANGELOG.md, copy from repo root (semantic-release output)
            if [ ! -f "$changelog_path" ] && [ -f "CHANGELOG.md" ]; then
              cp "CHANGELOG.md" "$changelog_path"
            fi

            # Skip if already has frontmatter
            if [ -f "$changelog_path" ]; then
              if head -n 1 "$changelog_path" | grep -q '^---$'; then
                echo "[SKIP] ${skill_name}/CHANGELOG.md already has frontmatter"
                continue
              fi

              # Extract version from first ## [x.x.x] line
              version=$(grep -oP '(?<=^## \[)\d+\.\d+\.\d+(?=\])' "$changelog_path" | head -n 1 || echo "unknown")
              date=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")

              # DYNAMIC frontmatter: name = skill_name, github_path = "{skill_name}/CHANGELOG.md"
              {
                echo "---"
                echo "title: Changelog"
                echo "name: ${skill_name}"
                echo "description: Automated release history for ${skill_name}."
                echo "version: ${version}"
                echo "github_repository: nervlin4444/ai.skills.incubation"
                echo "target_branch: main"
                echo "updated_at: ${date}"
                echo "auth_config:"
                echo "  provider: github"
                echo "  auth_method: token"
                echo "  token_env_var: GITHUB_TOKEN"
                echo "  env_file_path: "{baseDir}/.env""
                echo "file_mapping:"
                echo "  - local_path: "{baseDir}/CHANGELOG.md""
                echo "    github_path: "${skill_name}/CHANGELOG.md""
                echo "---"
                echo ""
              } > "/tmp/fm_${skill_name}.md"

              # Prepend frontmatter to CHANGELOG.md
              cat "/tmp/fm_${skill_name}.md" "$changelog_path" > "/tmp/new_${skill_name}_changelog.md"
              mv "/tmp/new_${skill_name}_changelog.md" "$changelog_path"

              git add "$changelog_path"
              changed=1
              echo "[OK] Added frontmatter to ${skill_name}/CHANGELOG.md (name=${skill_name}, github_path=${skill_name}/CHANGELOG.md)"
            fi
          done

          # Commit and push if changes exist
          if [ $changed -eq 1 ]; then
            git config user.name "semantic-release-bot"
            git config user.email "semantic-release@users.noreply.github.com"
            git commit -m "docs: add frontmatter to CHANGELOG.md files [skip ci]"
            git push origin main
          else
            echo "No CHANGELOG.md files needed frontmatter."
          fi
