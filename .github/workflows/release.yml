name: Release v2 Dynamic

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Add frontmatter to CHANGELOG.md files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          changed=0
          for file in $(find . -maxdepth 2 -name "CHANGELOG.md" -not -path "./.git/*"); do
            dir=$(dirname "$file")
            skill_name=$(basename "$dir")

            if ! head -5 "$file" | grep -q "^---"; then
              timestamp=$(date -u +%Y-%m-%dT%H:%M:%S+00:00)

              # 用 echo 逐行寫入，完全避免 heredoc 縮排陷阱
              echo "---"                                         > /tmp/fm.txt
              echo "title: \"Changelog\""                       >> /tmp/fm.txt
              echo "name: \"${skill_name}\""                   >> /tmp/fm.txt
              echo "description: \"Auto-generated changelog by semantic-release\"" >> /tmp/fm.txt
              echo "version: \"0.0.0\""                       >> /tmp/fm.txt
              echo "github_repository: \"nervlin4444/ai.skills.incubation\"" >> /tmp/fm.txt
              echo "target_branch: \"main\""                   >> /tmp/fm.txt
              echo "updated_at: \"${timestamp}\""              >> /tmp/fm.txt
              echo "fixes: []"                                    >> /tmp/fm.txt
              echo "auth_config:"                                >> /tmp/fm.txt
              echo "  provider: \"github\""                   >> /tmp/fm.txt
              echo "  auth_method: \"token\""                >> /tmp/fm.txt
              echo "  token_env_var: \"GITHUB_TOKEN\""        >> /tmp/fm.txt
              echo "  env_file_path: \".env\""                >> /tmp/fm.txt
              echo "file_mapping:"                               >> /tmp/fm.txt
              echo "  local_path: \"CHANGELOG.md\""          >> /tmp/fm.txt
              echo "  github_path: \"${skill_name}/CHANGELOG.md\"" >> /tmp/fm.txt
              echo "---"                                         >> /tmp/fm.txt
              echo ""                                            >> /tmp/fm.txt

              cat /tmp/fm.txt "$file" > /tmp/changelog_new.md
              mv /tmp/changelog_new.md "$file"
              git add "$file"
              echo "[OK] Added frontmatter to ${skill_name}/CHANGELOG.md"
              changed=1
            else
              echo "[SKIP] ${skill_name}/CHANGELOG.md already has frontmatter"
            fi
          done

          if [ "$changed" -eq 0 ]; then
            echo "[INFO] No CHANGELOG.md files need frontmatter updates."
          else
            git commit -m "docs: add frontmatter to CHANGELOG.md files [skip ci]"
            # CRITICAL FIX: 防 race condition（client REST API 上傳產生新 commit）
            git pull --rebase origin main
            git push origin main
          fi
