name: Release v2 Dynamic

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

      - name: Add frontmatter to CHANGELOG.md files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 掃描所有子目錄下的 CHANGELOG.md
          for file in $(find . -maxdepth 2 -name "CHANGELOG.md" -not -path "./.git/*"); do
            dir=$(dirname "$file")
            skill_name=$(basename "$dir")
            
            # 檢查是否已有 frontmatter
            if ! head -5 "$file" | grep -q "^---"; then
              # 生成統一 frontmatter
              cat > /tmp/fm.txt <<EOF
---
title: "Changelog"
name: "${skill_name}"
description: "Auto-generated changelog by semantic-release"
version: "0.0.0"
github_repository: "nervlin4444/ai.skills.incubation"
target_branch: "main"
updated_at: "$(date -u +%Y-%m-%dT%H:%M:%S+00:00)"
fixes: []
auth_config:
  provider: "github"
  auth_method: "token"
  token_env_var: "GITHUB_TOKEN"
  env_file_path: ".env"
file_mapping:
  local_path: "CHANGELOG.md"
  github_path: "${skill_name}/CHANGELOG.md"
---

EOF
              cat /tmp/fm.txt "$file" > /tmp/changelog_new.md
              mv /tmp/changelog_new.md "$file"
              git add "$file"
              echo "[OK] Added frontmatter to ${skill_name}/CHANGELOG.md (name=${skill_name}, github_path=${skill_name}/CHANGELOG.md)"
            else
              echo "[SKIP] ${skill_name}/CHANGELOG.md already has frontmatter"
            fi
          done
          
          # 如果有改動，commit 並 push
          if git diff --cached --quiet; then
            echo "[INFO] No CHANGELOG.md files need frontmatter updates."
          else
            git commit -m "docs: add frontmatter to CHANGELOG.md files [skip ci]"
            
            # ============================================================
            # CRITICAL FIX: 防 race condition
            # 原因：client 用 REST API 上傳會產生新 commit，
            # 導致本地 main 落後於 remote，直接 push 會被拒絕
            # ============================================================
            git pull --rebase origin main
            git push origin main
          fi
